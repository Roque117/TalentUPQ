{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-background">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="particles-container" id="particles-js"></div>
    </div>
    
    <div class="auth-card animate-on-scroll">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h2>Iniciar Sesión</h2>
            <p>Ingresa tus credenciales para acceder</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <div class="input-container">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-control" required placeholder=" ">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <div class="form-underline"></div>
                </div>
            </div>
            
            <div class="form-group">
                <div class="input-container">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" class="form-control" required placeholder=" ">
                    <label for="password" class="form-label">Contraseña</label>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye"></i>
                    </button>
                    <div class="form-underline"></div>
                </div>
            </div>
            
            <div class="form-options">
    <label class="checkbox-container">
        <input type="checkbox" id="remember" name="remember">
        <span class="checkmark"></span>
        Recordar sesión
    </label>
    <a href="{{ url_for('forgot_password') }}" class="forgot-password">¿Olvidaste tu contraseña?</a>
</div>
            
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block login-btn">
                    <span class="btn-text">Iniciar Sesión</span>
                    <div class="btn-loader">
                        <div class="loader-dot"></div>
                        <div class="loader-dot"></div>
                        <div class="loader-dot"></div>
                    </div>
                    <i class="fas fa-arrow-right btn-icon"></i>
                </button>
            </div>
            
            <div class="social-login">
                <div class="divider">
                    <span>o ingresa con</span>
                </div>
                <div class="social-buttons">
                    <button type="button" class="social-btn google-btn">
                        <i class="fab fa-google"></i>
                        Google
                    </button>
                    <button type="button" class="social-btn linkedin-btn">
                        <i class="fab fa-linkedin"></i>
                        LinkedIn
                    </button>
                </div>
            </div>
            
            <div class="auth-footer">
                <p>¿No tienes una cuenta? <a href="{{ url_for('registro') }}" class="auth-link">Regístrate aquí</a></p>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.querySelector('.password-toggle i');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }
    
    // Form submission animation
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.querySelector('.auth-form');
        const loginBtn = document.querySelector('.login-btn');
        
        loginForm.addEventListener('submit', function(e) {
            // Simulate loading state
            loginBtn.classList.add('loading');
            
            // Let the form submit normally after animation
            setTimeout(() => {
                loginBtn.classList.remove('loading');
            }, 2000);
        });
        
        // Add floating label functionality
        const formInputs = document.querySelectorAll('.form-control');
        
        formInputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (this.value === '') {
                    this.parentElement.classList.remove('focused');
                }
            });
            
            // Check if input has value on page load
            if (input.value !== '') {
                input.parentElement.classList.add('focused');
            }
        });
        
        // Social login buttons animation
        const socialButtons = document.querySelectorAll('.social-btn');
        socialButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                this.style.transform = 'translateY(0)';
                setTimeout(() => {
                    this.style.transform = 'translateY(-2px)';
                }, 100);
            });
        });
        
        // Simple particle effect
        createParticles();
    });
    
    function createParticles() {
        const container = document.querySelector('.particles-container');
        const particleCount = 15;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.cssText = `
                position: absolute;
                width: 4px;
                height: 4px;
                background: rgba(52, 152, 219, 0.3);
                border-radius: 50%;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                animation: particleFloat ${10 + Math.random() * 20}s infinite linear;
                animation-delay: ${Math.random() * 5}s;
            `;
            container.appendChild(particle);
        }
        
        // Add particle animation to styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes particleFloat {
                0% {
                    transform: translateY(100vh) rotate(0deg);
                    opacity: 0;
                }
                10% {
                    opacity: 1;
                }
                90% {
                    opacity: 1;
                }
                100% {
                    transform: translateY(-100px) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    }
</script>

    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    font-size: 1rem;
}

.admin-input-group input:focus + label,
.admin-input-group input:valid + label {
    top: -18px;
    font-size: 0.8rem;
    color: #4fc3f7;
    text-shadow: 0 1px 5px rgba(79, 195, 247, 0.5);
}

.admin-underline {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #4fc3f7, #64b5f6);
    transition: width 0.4s ease-out;
    box-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
}

.admin-input-group input:focus ~ .admin-underline {
    width: 100%;
}

.admin-submit-btn {
    background: linear-gradient(135deg, rgba(0, 80, 160, 0.6), rgba(0, 60, 120, 0.8));
    color: white;
    border: none;
    padding: 16px;
    border-radius: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-weight: bold;
    font-size: 1rem;
    transition: all 0.4s;
    overflow: hidden;
    position: relative;
    margin-top: 20px;
    box-shadow: 0 5px 20px rgba(0, 60, 120, 0.4);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    letter-spacing: 0.5px;
}

.admin-submit-btn:hover {
    background: linear-gradient(135deg, rgba(79, 195, 247, 0.5), rgba(0, 80, 160, 0.7));
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 30px rgba(0, 100, 200, 0.5);
}

.admin-submit-btn:active {
    transform: translateY(1px);
    box-shadow: 0 3px 15px rgba(0, 100, 200, 0.5);
}

.admin-submit-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(79, 195, 247, 0.3), transparent);
    transition: 0.5s;
}

.admin-submit-btn:hover::before {
    left: 100%;
}

.admin-submit-btn svg {
    width: 18px;
    height: 18px;
    stroke: #4fc3f7;
    stroke-width: 2;
    transition: all 0.4s;
}

.admin-submit-btn:hover svg {
    transform: translateX(5px) rotate(360deg);
}

.admin-note {
    text-align: center;
    font-size: 0.85rem;
    opacity: 0.7;
    margin-top: 2rem;
    color: rgba(180, 220, 255, 0.7);
    transform: translateY(10px);
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.8s forwards;
}

/* Animaciones */
@keyframes pulse {
    0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(79, 195, 247, 0.7)); }
    50% { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(79, 195, 247, 1)); }
    100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(79, 195, 247, 0.7)); }
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes modalEntrance {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes shine {
    0% { transform: rotate(30deg) translate(-30%, -30%); }
    100% { transform: rotate(30deg) translate(30%, 30%); }
}

/* Efecto de éxito al loguearse */
.success-animation {
    animation: successAnimation 1.5s ease-out forwards;
}

@keyframes successAnimation {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.9; }
    100% { transform: scale(0.9); opacity: 0; }
}

.hidden {
    display: none !important;
}
</style>

<script>
    // Detector de combinación de teclas para acceso admin mejorado
    document.addEventListener('DOMContentLoaded', function() {
        let inputSequence = [];
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        const modKey = isMac ? 'Meta' : 'Control';
        const secretSequence = [modKey, 'a', 'b', 'c'];
        
        document.addEventListener('keydown', function(e) {
            // Agregar la tecla presionada al array
            inputSequence.push(e.key);
            
            // Mantener solo los últimos N elementos (longitud de la secuencia secreta)
            if (inputSequence.length > secretSequence.length) {
                inputSequence.shift();
            }
            
            // Verificar si coincide con la secuencia secreta
            if (arraysEqual(inputSequence, secretSequence)) {
                // Mostrar el modal con animación
                const modal = document.getElementById('adminLoginModal');
                modal.classList.remove('hidden');
                modal.classList.add('show');
                
                // Resetear la secuencia
                inputSequence = [];
                
                // Enfocar el primer campo de entrada
                setTimeout(() => {
                    document.getElementById('adminEmail').focus();
                }, 300);
            }
        });
        
        // Función para comparar arrays
        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }
        // Manejar el envío del formulario de admin
document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
    const email = document.getElementById('adminEmail').value;
    const password = document.getElementById('adminPassword').value;
    const modal = document.getElementById('adminLoginModal');
    const modalContent = modal.querySelector('.admin-modal-content');
    
    // Solo validación del lado del cliente para efectos visuales
    if (email === 'Admin@upq.edu.mx' && password === 'Admin1234') {
        // Efecto visual de éxito
        modalContent.classList.add('animate__animated', 'animate__fadeOutUp');
        // Dejar que el formulario se envíe normalmente
    } else {
        // Prevenir el envío solo si las credenciales son incorrectas
        e.preventDefault();
        
        // Efecto de error
        modalContent.classList.add('animate__animated', 'animate__shakeX');
        
        // Restablecer después de la animación
        setTimeout(() => {
            modalContent.classList.remove('animate__animated', 'animate__shakeX');
            document.getElementById('adminPassword').value = '';
        }, 1000);
        
        // Mostrar mensaje de error
        const errorNote = document.createElement('p');
        errorNote.className = 'admin-error-note';
        errorNote.textContent = 'Credenciales incorrectas';
        errorNote.style.color = '#ff6b6b';
        errorNote.style.textAlign = 'center';
        errorNote.style.marginTop = '10px';
        errorNote.style.animation = 'fadeIn 0.3s ease-out';
        
        // Eliminar mensaje anterior si existe
        const existingError = document.querySelector('.admin-error-note');
        if (existingError) existingError.remove();
        
        // Insertar después del botón de submit
        const submitBtn = document.querySelector('.admin-submit-btn');
        submitBtn.parentNode.insertBefore(errorNote, submitBtn.nextSibling);
    }
});
        
        // Cerrar modal al hacer clic en la X
        document.querySelector('.admin-close-btn').addEventListener('click', function() {
            const modal = document.getElementById('adminLoginModal');
            modal.classList.remove('show');
            modal.classList.add('hidden');
            
            // Resetear formulario
            document.getElementById('adminLoginForm').reset();
            
            // Resetear secuencia
            inputSequence = [];
        });
        
        // Cerrar modal al hacer clic fuera del contenido
        document.getElementById('adminLoginModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('show');
                this.classList.add('hidden');
                
                // Resetear formulario
                document.getElementById('adminLoginForm').reset();
                
                // Resetear secuencia
                inputSequence = [];
            }
        });
    });
</script>
