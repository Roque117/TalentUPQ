name: Deploy con Verificación UPQ

on:
  push:
    branches: [ main ]

jobs:
  test: # <--- PRIMER TRABAJO: EL INSPECTOR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Instalar Pytest
        run: pip install pytest flask
      - name: Correr pruebas de sintaxis
        run: |
          # Intentamos ejecutar el test. Si 'hello.py' tiene basura, fallará aquí.
          pytest test_app.py 

  deploy: # <--- SEGUNDO TRABAJO: EL MENSAJERO
    needs: test # <--- ¡ESTO ES LO MÁS IMPORTANTE! Si el test falla, esto no corre.
    runs-on: ubuntu-latest
    steps:
      - name: Conectar a Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.PROJECT_PATH }}
            git pull origin main
            sudo docker compose up -d --build
            