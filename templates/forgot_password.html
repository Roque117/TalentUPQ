{% extends "base.html" %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-background">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
    </div>
    
    <div class="auth-card animate-on-scroll">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-envelope"></i>
            </div>
            <h2>Recuperar Contraseña</h2>
            <p>Te enviaremos un código de verificación a tu correo</p>
        </div>
        
        <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
            <div class="form-group">
                <div class="input-container">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-control" required placeholder=" ">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <div class="form-underline"></div>
                </div>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block login-btn">
                    <i class="fas fa-paper-plane"></i>
                    <span>Enviar código de verificación</span>
                </button>
            </div>
            
            <div class="auth-footer">
                <p><a href="{{ url_for('login') }}" class="auth-link">
                    <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
                </a></p>
            </div>
        </form>
    </div>
</div>

<style>
    .auth-container {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        overflow: hidden;
    }
    
    .auth-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
    }
    
    .floating-shape {
        position: absolute;
        border-radius: 50%;
        opacity: 0.08;
        animation: float 20s infinite ease-in-out;
    }
    
    .shape-1 {
        width: 150px;
        height: 150px;
        background: linear-gradient(135deg, #3498db, #2ecc71);
        top: 10%;
        left: 5%;
        animation-delay: 0s;
    }
    
    .shape-2 {
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, #2ecc71, #3498db);
        top: 70%;
        right: 10%;
        animation-delay: 7s;
    }
    
    .shape-3 {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #3498db, #9b59b6);
        bottom: 20%;
        left: 15%;
        animation-delay: 14s;
    }
    
    .auth-card {
        background: #fff;
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.12);
        width: 100%;
        max-width: 450px;
        position: relative;
        z-index: 2;
        border: 1px solid #f1f3f4;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .auth-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 35px 100px rgba(0, 0, 0, 0.18);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }
    
    .auth-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, #3498db, #2ecc71);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
        box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3);
        animation: iconPulse 2s infinite ease-in-out;
    }
    
    .auth-header h2 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        color: #2c3e50;
        font-weight: 700;
    }
    
    .auth-header p {
        color: #5a6c7d;
        font-size: 1rem;
    }
    
    .auth-form {
        width: 100%;
    }
    
    .form-group {
        margin-bottom: 2rem;
    }
    
    .input-container {
        position: relative;
    }
    
    .input-icon {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        color: #3498db;
        font-size: 1.1rem;
        transition: all 0.3s ease;
        z-index: 2;
    }
    
    .form-control {
        width: 100%;
        padding: 14px 14px 14px 35px;
        border: none;
        background: transparent;
        border-bottom: 2px solid #e1e5e9;
        font-size: 1rem;
        transition: all 0.3s ease;
        color: #2c3e50;
        font-weight: 500;
        position: relative;
        z-index: 1;
    }
    
    .form-control:focus {
        outline: none;
        border-bottom-color: transparent;
    }
    
    .form-control:focus + .form-label,
    .form-control:not(:placeholder-shown) + .form-label {
        top: -20px;
        left: 35px;
        font-size: 0.8rem;
        color: #3498db;
        font-weight: 600;
    }
    
    .form-label {
        position: absolute;
        top: 50%;
        left: 35px;
        transform: translateY(-50%);
        color: #5a6c7d;
        font-weight: 500;
        transition: all 0.3s ease;
        pointer-events: none;
        z-index: 0;
    }
    
    .form-underline {
        position: absolute;
        bottom: 0;
        left: 35px;
        width: calc(100% - 35px);
        height: 2px;
        background: linear-gradient(to right, #3498db, #2ecc71);
        transform: scaleX(0);
        transition: transform 0.4s ease;
        transform-origin: left;
    }
    
    .form-control:focus ~ .form-underline {
        transform: scaleX(1);
    }
    
    .login-btn {
        width: 100%;
        padding: 16px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #3498db, #2ecc71);
        border: none;
        color: white;
        box-shadow: 0 8px 25px rgba(52, 152, 219, 0.3);
    }
    
    .login-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(52, 152, 219, 0.4);
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e1e5e9;
    }
    
    .auth-link {
        color: #3498db;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    
    .auth-link:hover {
        color: #2980b9;
    }
    
    @keyframes float {
        0%, 100% {
            transform: translateY(0) rotate(0deg);
        }
        50% {
            transform: translateY(-20px) rotate(5deg);
        }
    }
    
    @keyframes iconPulse {
        0%, 100% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.05);
        }
    }
    
    @media (max-width: 768px) {
        .auth-card {
            padding: 2rem 1.5rem;
        }
        
        .auth-header h2 {
            font-size: 1.8rem;
        }
        
        .auth-icon {
            width: 70px;
            height: 70px;
            font-size: 1.8rem;
        }
    }
</style>
{% endblock %}
