version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: talentupq_db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - talentupq_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  flask_app:
    build: .
    container_name: talentupq_flask
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=production
    ports:
      - "5000:5000" 
    depends_on:
      db:
        condition: service_healthy
    networks:
      - talentupq_network
    restart: unless-stopped
    
    # --- ESTO ES LO QUE MANTIENE LA APP ARRIBA ---
    deploy:
      update_config:
        order: start-first    # Primero levanta el nuevo, luego mata el viejo
        failure_action: rollback
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"] # <-- Cambiado a 5001
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ---------------------------------------------

    volumes:
      - uploads_data:/app/static/uploads

volumes:
  postgres_data:
  uploads_data:

networks:
  talentupq_network:
    driver: bridge