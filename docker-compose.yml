version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - talentupq_network
    restart: unless-stopped

  flask_app:
    build: .
    environment:
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    depends_on:
      - sqlserver
    networks:
      - talentupq_network
    restart: unless-stopped
    volumes:
      - uploads_data:/app/static/uploads

  react_app:
    build: ./frontend-react
    ports:
      - "3000:3000"
    networks:
      - talentupq_network
    restart: unless-stopped

volumes:
  sqlserver_data:
  uploads_data:

networks:
  talentupq_network:
    driver: bridge